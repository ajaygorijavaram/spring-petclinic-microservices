apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers
spec:
  replicas: 1
  selector: { matchLabels: { app: customers } }
  template:
    metadata: { labels: { app: customers } }
    spec:
      containers:
        - name: customers
          image: CUSTOMERS_IMAGE
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: customers }
spec:
  selector: { app: customers }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vets
spec:
  replicas: 1
  selector: { matchLabels: { app: vets } }
  template:
    metadata: { labels: { app: vets } }
    spec:
      containers:
        - name: vets
          image: VETS_IMAGE
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: vets }
spec:
  selector: { app: vets }
  ports: [{ port: 8080, targetPort: 8080 }]
